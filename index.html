<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM STATUS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 기본 스타일 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'IBM Plex Mono', 'Noto Sans KR', monospace;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 화면 컨테이너 공통 스타일 */
        .screen {
            position: fixed;
            inset: 0;
            display: none; /* 기본적으로는 숨김 */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }

        /* 1. 정상 상태 화면 */
        #normal-screen {
            background-color: #0d0d0b;
            color: #33ff33;
        }
        #normal-screen .title {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-shadow: 0 0 5px #33ff33;
        }
        #normal-screen .subtitle {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #aaa;
            letter-spacing: 0.1em;
        }
        #normal-screen .blinking-cursor {
            display: inline-block;
            width: 10px;
            height: 1.2rem;
            background-color: #33ff33;
            animation: blink 1s step-end infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        /* 2. 셧다운 상태 화면 */
        #shutdown-screen {
            background-color: #000000;
            color: #ff3333;
        }
        #shutdown-screen .title {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 0.3em;
            text-shadow: 0 0 8px #ff3333;
            animation: blink 1.5s ease-in-out infinite;
        }
        #shutdown-screen .subtitle {
            margin-top: 1.2rem;
            font-size: 1rem;
            color: #ccc;
            letter-spacing: 0.1em;
            opacity: 0;
            animation: fade-in 4s 1.5s forwards;
        }

        /* 애니메이션 */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        @keyframes fade-in {
            to { opacity: 0.8; }
        }
    </style>
</head>
<body>

    <!-- 정상 상태일 때 표시될 화면 -->
    <div id="normal-screen" class="screen">
        <div class="title">SYSTEM: NORMAL<span class="blinking-cursor"></span></div>
        <p class="subtitle">Awaiting The Second Advent...</p>
    </div>

    <!-- 셧다운 상태일 때 표시될 화면 -->
    <div id="shutdown-screen" class="screen">
        <div class="title">CONNECTION LOST</div>
        <p class="subtitle">재림(再臨)이 개시되었습니다.</p>
    </div>

    <script>
        // 이 코드는 페이지가 로드될 때 실행됩니다.
        window.onload = function() {
            // =======================================================
            // ▼▼▼ 여기만 수정하시면 됩니다 ▼▼▼
            //
            // 형식을 지켜주세요: 'YYYY-MM-DDTHH:mm:ss+09:00'
            // 예시: 2026년 5월 5일 00시 00분 (한국 시간 기준)
            //
            const TARGET_TIME = '2026-05-05T00:00:00+09:00';
            //
            // ▲▲▲ 여기만 수정하시면 됩니다 ▲▲▲
            // =======================================================

            // 목표 시간과 현재 시간을 Date 객체로 변환
            const targetDate = new Date(TARGET_TIME);
            const now = new Date();

            // 현재 시간이 목표 시간을 지났는지 확인
            if (now >= targetDate) {
                // 시간이 지났으면: 셧다운 화면 표시
                document.getElementById('shutdown-screen').style.display = 'flex';
                document.getElementById('normal-screen').style.display = 'none';
                console.log("목표 시간이 경과했습니다. 셧다운 모드를 활성화합니다.");
            } else {
                // 아직 시간이 안 됐으면: 정상 화면 표시
                document.getElementById('normal-screen').style.display = 'flex';
                document.getElementById('shutdown-screen').style.display = 'none';
                console.log("시스템 정상. 목표 시간까지 대기합니다.");
            }
        };
    </script>

</body>
</html>
